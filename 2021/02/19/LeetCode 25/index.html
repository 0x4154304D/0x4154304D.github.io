span><br><span class="line">      ListNode curDummy = dummy;</span><br><span class="line">      ListNode cur = head;</span><br><span class="line">      <span class="keyword">while</span> (cur != <span class="keyword">null</span>) &#123;</span><br><span class="line">          <span class="keyword">int</span> num = <span class="number">1</span>;</span><br><span class="line">          <span class="keyword">while</span> (num &lt; k &amp;&amp; cur != <span class="keyword">null</span>) &#123;</span><br><span class="line">              cur = cur.next;</span><br><span class="line">              <span class="keyword">if</span> (cur != <span class="keyword">null</span>) &#123;</span><br><span class="line">                  ++num;</span><br><span class="line">              &#125;</span><br><span class="line">          &#125;</span><br><span class="line">          ListNode nextHead = <span class="keyword">null</span>;</span><br><span class="line">          ListNode curtail = <span class="keyword">null</span>;</span><br><span class="line">         	<span class="comment">// break </span></span><br><span class="line">          <span class="keyword">if</span> (num == k) &#123;</span><br><span class="line">              nextHead = cur.next;</span><br><span class="line">              cur.next = <span class="keyword">null</span>;</span><br><span class="line">              curtail = curDummy.next;</span><br><span class="line">              curDummy.next = reverse(curDummy.next);</span><br><span class="line">          &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">              <span class="keyword">return</span> dummy.next;</span><br><span class="line">          &#125;</span><br><span class="line">        	<span class="comment">// merge</span></span><br><span class="line">          curDummy = curtail;</span><br><span class="line">          curDummy.next = nextHead;</span><br><span class="line">          cur = nextHead;</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="keyword">return</span> dummy.next;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// Reverse LinkedList</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> ListNode <span class="title">reverse</span><span class="params">(ListNode head)</span> </span>&#123;</span><br><span class="line">      ListNode dummy = <span class="keyword">new</span> ListNode(<span class="number">0</span>, <span class="keyword">null</span>);</span><br><span class="line">      <span class="keyword">while</span> (head != <span class="keyword">null</span>) &#123;</span><br><span class="line">          ListNode tmp = head.next;</span><br><span class="line">          head.next = dummy.next;</span><br><span class="line">          dummy.next = head;</span><br><span class="line">          head = tmp;</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="keyword">return</span> dummy.next;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
