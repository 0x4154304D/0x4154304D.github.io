    <header class="post-header">
      <h1 class="post-title">
        
          conda更换软件源
        
      </h1>

      <time class="post-time">
          3月 07 2020
      </time>
    </header>



    
            <div class="post-content">
            <p>清华：</p>
<blockquote>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/</span><br><span class="line">conda config --<span class="built_in">set</span>` `show_channel_urls yes</span><br></pre></td></tr></table></figure>
</blockquote>
<p>中科大：</p>
<blockquote>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">conda config --add channels https://mirrors.ustc.edu.cn/anaconda/pkgs/free/ </span><br><span class="line">conda config --<span class="built_in">set</span>` `show_channel_urls yes</span><br></pre></td></tr></table></figure>
</blockquote>
<p>注意要删除 .condarc文件 ，默认在C盘\users\username\的位置。或者把里面最后一行的–default删掉。</p>
<p>换回默认源：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">conda config --remove-key channels</span><br></pre></td></tr></table></figure>

<p>添加conda环境变量</p>
<p>在终端输入：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo vim ~/.bashrc</span><br></pre></td></tr></table></figure>

<p>在配置文件中添加</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">export</span> PATH=~/anaconda3/bin:<span class="variable">$PATH</span></span><br></pre></td></tr></table></figure>

<p>立即生效，输入：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">source</span> ~/.bashrc</span><br></pre></td></tr></table></figure>
