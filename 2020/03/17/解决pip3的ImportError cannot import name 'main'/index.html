      <h1 class="post-title">
        
          pip3的ImportError
        
      </h1>

      <time class="post-time">
          3月 17 2020
      </time>
    </header>



    
            <div class="post-content">
            <p>修改/usr/bin/pip3文件</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> pip <span class="keyword">import</span> main</span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">'__main__'</span>:      </span><br><span class="line">  sys.exit(main())</span><br></pre></td></tr></table></figure>

<p>问题产生的原因是pip3升级后，main函数被修改造成的</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> pip <span class="keyword">import</span> __main__      //这行要修改</span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">'__main__'</span>:</span><br><span class="line">  sys.exit(__main__._main())  //增加__main__._</span><br></pre></td></tr></table></figure>

<p>保存文件后再使用pip3就一切正常了</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">root@lenovo:/usr/bin# pip3 --version</span><br><span class="line">pip 19.3.1 from /usr/local/lib/python3.6/dist-packages/pip (python 3.6)</span><br></pre></td></tr></table></figure>
