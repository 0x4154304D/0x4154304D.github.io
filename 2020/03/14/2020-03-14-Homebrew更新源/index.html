      <h1 class="post-title">
        
          Homebrew更新源
        
      </h1>

      <time class="post-time">
          3月 14 2020
      </time>
    </header>



    
            <div class="post-content">
            <p>对Homebrew更新的话，需要更新四个模块的镜像</p>
<ul>
<li>Homebrew</li>
<li>Homebrew Core</li>
<li>Homebrew-bottles</li>
<li>Homebrew Cask</li>
</ul>
<p>USTC包含上述的所有源，而其他家都缺少Cask源。</p>
<p>替换命令</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 替换 Homebrew</span></span><br><span class="line"><span class="built_in">cd</span> $(brew --repo)</span><br><span class="line">git remote <span class="built_in">set</span>-url origin https://mirrors.ustc.edu.cn/brew.git</span><br><span class="line"></span><br><span class="line"><span class="comment"># 替换 Homebrew Core</span></span><br><span class="line"><span class="built_in">cd</span> $(brew --repo homebrew/core)</span><br><span class="line">git remote <span class="built_in">set</span>-url origin https://mirrors.ustc.edu.cn/homebrew-core.git</span><br><span class="line"></span><br><span class="line"><span class="comment"># 替换 Homebrew Cask</span></span><br><span class="line"><span class="built_in">cd</span> $(brew --repo homebrew/cask)</span><br><span class="line">git remote <span class="built_in">set</span>-url origin https://mirrors.ustc.edu.cn/homebrew-cask.git</span><br><span class="line"></span><br><span class="line"><span class="comment"># 替换 Homebrew-bottles</span></span><br><span class="line"><span class="comment"># 对于 bash 用户：</span></span><br><span class="line"><span class="built_in">echo</span><span class="string">'export HOMEBREW_BOTTLE_DOMAIN=https://mirrors.ustc.edu.cn/homebrew-bottles'</span>&gt;&gt; ~/.bash_profile</span><br><span class="line"><span class="built_in">source</span>~/.bash_profile</span><br><span class="line"></span><br><span class="line"><span class="comment"># 对于 zsh 用户：</span></span><br><span class="line"><span class="built_in">echo</span><span class="string">'export HOMEBREW_BOTTLE_DOMAIN=https://mirrors.ustc.edu.cn/homebrew-bottles'</span>&gt;&gt; ~/.zshrc</span><br><span class="line"><span class="built_in">source</span>~/.zshrc</span><br></pre></td></tr></table></figure>
