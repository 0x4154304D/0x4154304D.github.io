      <h1 class="post-title">
        
          Tomcat安装配置
        
      </h1>

      <time class="post-time">
          2月 23 2020
      </time>
    </header>



    
            <div class="post-content">
            <h3 id="0-下载解压安装包"><a href="#0-下载解压安装包" class="headerlink" title="0.下载解压安装包"></a>0.下载解压安装包</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">wget https://mirrors.tuna.tsinghua.edu.cn/apache/tomcat/tomcat-9/v9.0.31/bin/apache-tomcat-9.0.31.tar.gz</span><br><span class="line">tar -zxvf apache-tomcat-9.0.31.tar.gz</span><br></pre></td></tr></table></figure>

<h3 id="1-将解压好的文件夹拷贝到指定位置并启动"><a href="#1-将解压好的文件夹拷贝到指定位置并启动" class="headerlink" title="1.将解压好的文件夹拷贝到指定位置并启动"></a>1.将解压好的文件夹拷贝到指定位置并启动</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">mv apache-tomcat-9.0.31 /usr/<span class="built_in">local</span>/tomcat</span><br><span class="line"><span class="built_in">cd</span> /usr/<span class="built_in">local</span>/tomcat/apache-tomcat-9.0.31/bin</span><br><span class="line">./startup.sh</span><br></pre></td></tr></table></figure>

<h3 id="2-检查是否安装成功。"><a href="#2-检查是否安装成功。" class="headerlink" title="2.检查是否安装成功。"></a>2.检查是否安装成功。</h3><p>浏览器查看<a href="http://localhost:8080" target="_blank" rel="noopener">http://localhost:8080</a></p>
<p>或者在终端中输入</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">$~ curl 127.0.0.1:8080</span><br><span class="line"><span class="comment">#成功启动则返回页面的HTML</span></span><br><span class="line">&lt;!DOCTYPE html&gt;</span><br><span class="line">&lt;html lang=<span class="string">"en"</span>&gt;</span><br><span class="line">    &lt;head&gt;</span><br><span class="line">        &lt;meta charset=<span class="string">"UTF-8"</span> /&gt;</span><br><span class="line">        &lt;title&gt;Apache Tomcat/9.0.34&lt;/title&gt;</span><br><span class="line">-----</span><br><span class="line">中间省略</span><br><span class="line">-----</span><br><span class="line">    &lt;/body&gt;</span><br><span class="line">&lt;/html&gt;</span><br><span class="line"><span class="comment">#失败则返回</span></span><br><span class="line">curl: (7) Failed to connect to 127.0.0.1 port 8080: 拒绝连接</span><br></pre></td></tr></table></figure>

<h3 id="3-编写快速启动脚本"><a href="#3-编写快速启动脚本" class="headerlink" title="3.编写快速启动脚本"></a>3.编写快速启动脚本</h3><p>创建</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">cd</span> /etc/rc.d/init.d/</span><br><span class="line">touch tomcat</span><br><span class="line">chmod +x tomcat</span><br></pre></td></tr></table></figure>

<p>编辑文件</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">vim tomcat</span><br><span class="line"><span class="comment">#填入以下内容</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#!/bin/bash</span></span><br><span class="line"><span class="comment">#chkconfig:- 20 90</span></span><br><span class="line"><span class="comment">#description:tomcat</span></span><br><span class="line"><span class="comment">#processname:tomcat</span></span><br><span class="line">TOMCAT_HOME=/usr/<span class="built_in">local</span>/tomcat/apache-tomcat-9.0.31</span><br><span class="line"><span class="keyword">case</span> <span class="variable">$1</span> <span class="keyword">in</span></span><br><span class="line">start) su root <span class="variable">$TOMCAT_HOME</span>/bin/startup.sh;;</span><br><span class="line">stop) su root <span class="variable">$TOMCAT_HOME</span>/bin/shutdown.sh;;</span><br><span class="line">*) <span class="built_in">echo</span> <span class="string">"require start|stop"</span> ;;</span><br><span class="line"><span class="keyword">esac</span></span><br></pre></td></tr></table></figure>

<p>Tomcat快捷启动命令</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">service tomcat start</span><br><span class="line">service tomcat stop</span><br></pre></td></tr></table></figure>

<h3 id="4-开机自启动"><a href="#4-开机自启动" class="headerlink" title="4.开机自启动"></a>4.开机自启动</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">chkconfig --add tomcat</span><br><span class="line">chkconfig tomcat on</span><br></pre></td></tr></table></figure>
