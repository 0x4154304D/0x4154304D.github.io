      <h1 class="post-title">
        
          Nginx源码安装
        
      </h1>

      <time class="post-time">
          2月 12 2020
      </time>
    </header>



    
            <div class="post-content">
            <h3 id="0-安装Nginx依赖包"><a href="#0-安装Nginx依赖包" class="headerlink" title="0.安装Nginx依赖包"></a>0.安装Nginx依赖包</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">yum install -y pcre-devel zlib-devel openssl-devel wget gcc tree vim</span><br></pre></td></tr></table></figure>

<h3 id="1-从Nginx官网下载并解压源码包"><a href="#1-从Nginx官网下载并解压源码包" class="headerlink" title="1.从Nginx官网下载并解压源码包"></a>1.从Nginx官网下载并解压源码包</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">wget https://nginx.org/download/nginx-1.16.1.tar.gz</span><br><span class="line">tar -zxvf nginx-1.16.1.tar.gz</span><br></pre></td></tr></table></figure>

<h3 id="2-Nginx编译前配置"><a href="#2-Nginx编译前配置" class="headerlink" title="2.Nginx编译前配置"></a>2.Nginx编译前配置</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">cd</span> nginx-1.16.1</span><br><span class="line">./configure --prefix=/usr/<span class="built_in">local</span>/nginx --with-http_ssl_module</span><br><span class="line"></span><br><span class="line">--prefix:配置configure脚本，软件的安装位置</span><br></pre></td></tr></table></figure>

<h3 id="3-进行安装编译"><a href="#3-进行安装编译" class="headerlink" title="3.进行安装编译"></a>3.进行安装编译</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">make &amp;&amp; make install</span><br></pre></td></tr></table></figure>

<h3 id="4-检查安装情况"><a href="#4-检查安装情况" class="headerlink" title="4.检查安装情况"></a>4.检查安装情况</h3><p>进入安装目录进行检查</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">cd</span> /usr/<span class="built_in">local</span>/nginx</span><br><span class="line"></span><br><span class="line"><span class="comment">#配置文件位置</span></span><br><span class="line">/usr/<span class="built_in">local</span>/nginx/conf/nginx.conf</span><br></pre></td></tr></table></figure>

<p>运行nginx</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">cd</span> sbin</span><br><span class="line">./nginx</span><br></pre></td></tr></table></figure>

<h3 id="5-停止Nginx"><a href="#5-停止Nginx" class="headerlink" title="5.停止Nginx"></a>5.停止Nginx</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#1. 立即停止Nginx服务</span></span><br><span class="line"> /usr/<span class="built_in">local</span>/nginx/sbin/nginx -s stop </span><br><span class="line"><span class="comment">#2.完成当前任务后停止</span></span><br><span class="line"> /usr/<span class="built_in">local</span>/nginx/sbin/nginx -s quit </span><br><span class="line"><span class="comment">#3.杀死Nginx进程</span></span><br><span class="line"> killall nginx</span><br></pre></td></tr></table></figure>

<h3 id="6-Nginx添加到环境变量"><a href="#6-Nginx添加到环境变量" class="headerlink" title="6.Nginx添加到环境变量"></a>6.Nginx添加到环境变量</h3><p>使用软连接将<code>nginx</code>链接到<code>/usr/local/sbin</code></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">ln -s /usr/<span class="built_in">local</span>/nginx/sbin/nginx /usr/<span class="built_in">local</span>/sbin</span><br><span class="line">ll /usr/<span class="built_in">local</span>/sbin/ | grep <span class="string">"nginx"</span></span><br></pre></td></tr></table></figure>

<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#1.显示当前环境变量`PATH`</span></span><br><span class="line">	<span class="built_in">echo</span> <span class="variable">$PATH</span></span><br><span class="line"><span class="comment">#2.编辑`.bash_profile`文件</span></span><br><span class="line">	vim ~/.bashrc</span><br><span class="line"><span class="comment">#3.在`.bash_profile`文件末尾加入以下内容</span></span><br><span class="line">	<span class="built_in">export</span> PATH=<span class="variable">$PATH</span>:/usr/<span class="built_in">local</span>/nginx/sbin</span><br><span class="line"><span class="comment">#4.立即生效</span></span><br><span class="line">	<span class="built_in">source</span> ~/.bashrc</span><br></pre></td></tr></table></figure>
